name: affirmup
description: Daily affirmations with mirror work — AffirmUp

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # Architecture
  get_it: ^9.2.1
  flutter_bloc: ^9.1.0
  go_router: ^17.1.0
  # Data
  shared_preferences: ^2.5.0
  # Presentation
  cupertino_icons: ^1.0.4
  # Animations
  flutter_animate: ^4.5.0
  # Code Quality
  equatable: ^2.0.3
  meta: any
  collection: ^1.18.0
  # System
  share_plus: ^12.0.0
  in_app_review: ^2.0.9
  # Boilerplate generation
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

dev_dependencies:
  test:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  bloc_test: ^10.0.0
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^3.0.0
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

  fonts:
    - family: WorkSans
      fonts:
        - asset: assets/fonts/work_sans/WorkSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/work_sans/WorkSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/work_sans/WorkSans-SemiBold.ttf
          weight: 600
