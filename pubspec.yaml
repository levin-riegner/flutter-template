name: flutter_template
description: Flutter template Application

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: "none"

# The following version field is ignored during the build process.
# Version name and version number are automatically generated in regards to
# Branch name and Commit count respectively.
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  ## Add your project dependencies here 👇
  # Architecture
  get_it: ^9.2.1
  provider: ^6.1.2
  rxdart: ^0.28.0
  flutter_bloc: ^9.1.0
  go_router: ^17.1.0
  # Data Management
  dio: ^5.9.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^4.0.0
  drift: ^2.22.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.0
  # Presentation Views
  cupertino_icons: ^1.0.4
  another_flushbar: ^1.12.29
  cached_network_image: ^3.3.1
  webview_flutter: ^4.13.0
  # Animations
  animations: ^2.1.0
  flutter_animate: ^4.5.0
  # 3rd Party Services
  flutter_branch_sdk: ^9.1.0
  datadog_flutter_plugin: ^3.1.0
  # Firebase
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.0
  firebase_crashlytics: ^5.0.0
  firebase_performance: ^0.11.1
  firebase_remote_config: ^6.2.0
  firebase_messaging: ^16.1.0
  google_api_availability: ^5.0.0
  # Code Quality
  logging_flutter: ^3.0.0
  meta: any
  collection: ^1.18.0
  equatable: ^2.0.3
  async: ^2.11.0
  # System Services
  url_launcher: ^6.3.0
  flutter_custom_tabs: ^2.5.0
  sensors_plus: ^7.0.0
  path_provider: ^2.1.2
  in_app_review: ^2.0.9
  permission_handler: ^12.0.0
  # TODO: Switch to app_versioning: ^1.3.0 once published to pub.dev
  app_versioning:
    git:
      url: https://github.com/levin-riegner/app_versioning.git
      ref: update/package-info-plus-9
  devicelocale: ^0.8.0
  # Plus Plugins
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  share_plus: ^12.0.0
  # Boilerplate generation
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

dev_dependencies:
  # Testing
  test:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.3
  bloc_test: ^10.0.0
  # Static Code Analysis
  flutter_lints: ^6.0.0
  # Code generation
  build_runner: ^2.4.9
  freezed: ^3.0.0
  drift_dev: ^2.22.0
  json_serializable: ^6.13.0
  go_router_builder: ^4.2.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - assets/
    - assets/images/
    - assets/images/2.0x/
    - assets/images/3.0x/

  # TODO: Replace with your project's fonts
  # Fonts
  fonts:
    - family: WorkSans
      fonts:
        - asset: assets/fonts/work_sans/WorkSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/work_sans/WorkSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/work_sans/WorkSans-SemiBold.ttf
          weight: 600

  # Adds code generation (synthetic package) support
  generate: true
